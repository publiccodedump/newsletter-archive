<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Newsletter Archive</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 720px; margin: 0 auto; padding: 48px 20px; color: #1a1a1a; line-height: 1.5; }
    h1 { font-size: 28px; margin-bottom: 4px; }
    .sub { color: #666; margin-bottom: 32px; }
    ul { list-style: none; padding: 0; }
    .issue { padding: 16px 0; border-bottom: 1px solid #eee; }
    .issue a { font-size: 18px; font-weight: 600; color: #0b57d0; text-decoration: none; }
    .issue a:hover { text-decoration: underline; }
    .meta { color: #888; font-size: 14px; margin-top: 4px; }
    footer { margin-top: 40px; color: #aaa; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Newsletter Archive</h1>
  <div class="sub">0 issues</div>
  <ul>
    <li class="issue"><em>No issues archived yet.</em></li>
  </ul>
  <footer>Generated by the Newsletter platform.</footer>
</body>
</html>
